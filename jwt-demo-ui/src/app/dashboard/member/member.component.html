<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<app-nav-bar></app-nav-bar>
<div class="main-layout">

  <!-- Sidebar -->
  <app-side-bar></app-side-bar>

  <!-- Content -->
  <div class="content">

    <div class="header">
      <h2>List of Members</h2>
      <!-- <button class="action-btn add-btn" (click)="openAddMemberDialog()">+ Add Member</button> -->
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- Name Column -->
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let member"> {{member.username}} </td>
        </ng-container>

        <!-- Project Name Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> Project Name </th>
          <td mat-cell *matCellDef="let member"> {{member.email}} </td>
        </ng-container>
      <!-- status Column -->
        <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let row">
        <span [ngClass]="row.isActive ? 'active-status' : 'inactive-status'">
          {{ row.isActive ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>


      <!-- Created Date -->
    <ng-container matColumnDef="createdDate">
      <th mat-header-cell *matHeaderCellDef> Created Date </th>
      <td mat-cell *matCellDef="let row">
        {{row.createdDate | date:'mediumDate'}}
      </td>
    </ng-container>

        <!-- Header and Row -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons></mat-paginator>

  </div>
</div>
